# Spring Boot Application Configuration
spring.application.name=payment-service
spring.profiles.active=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/paymentdb
spring.datasource.username=admin
spring.datasource.password=secret123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.root=INFO
logging.level.com.example.payment=DEBUG
logging.file.name=logs/application.log

# Security
jwt.secret=mySecretKey123456
jwt.expiration=86400000

# External API
payment.gateway.api.url=https://api.payment-gateway.com
payment.gateway.api.key=pk_test_1234567890
