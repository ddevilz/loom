# Pre-commit hooks for Loom.
#
# Install once after cloning:
#   uv tool install pre-commit   # (or: pipx install pre-commit)
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#
# Manual run:
#   pre-commit run --all-files                 # commit-stage checks
#   pre-commit run --hook-stage pre-push --all-files
#
# Stages:
#   - pre-commit: fast checks (ruff lint + format + unit tests)
#   - pre-push:   full test suite (unit + e2e, ~2 min)

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        name: ruff check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff format

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit, fast)
        entry: uv run pytest tests/unit -q
        language: system
        pass_filenames: false
        stages: [pre-commit]
        types_or: [python]

      - id: pytest-full
        name: pytest (unit + e2e)
        entry: uv run pytest tests/unit tests/e2e -q
        language: system
        pass_filenames: false
        stages: [pre-push]
