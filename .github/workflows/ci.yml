name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Test
        run: uv run pytest tests/unit/ -v --tb=short
        shell: bash

      - name: Build and smoke-test wheel
        run: |
          uv build --wheel
          uv run loom --version
          uv run python -c "from loom.mcp.run import run_stdio; print('mcp entry ok')"
          uv run python -c "from loom.core.context import resolve_db_path; print('resolve_db_path ok')"
          uv run python -c "from loom.cli.plugins import get_plugins; ps=get_plugins(); print(f'plugins ok: {len(ps)} registered')"
        shell: bash
