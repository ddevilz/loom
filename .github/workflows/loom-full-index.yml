name: Loom Full Index

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  loom-full-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Loom
        run: |
          uv sync

      - name: Start FalkorDB
        run: |
          docker run -d -p 6379:6379 --name loom-db falkordb/falkordb

      - name: Loom full index
        run: |
          uv run loom analyze . \
            --graph-name "${{ github.repository }}" \
            --force
        env:
          LOOM_DB_URL: ${{ secrets.LOOM_DB_URL }}
